{% extends 'base.html' %}

{% block content %}
<div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1>Tests</h1>
    {% if user.is_teacher %}
    <a href="{% url 'test_create' %}" class="btn btn-primary">Create New Test</a>
    {% endif %}
</div>

<div class="grid grid-cols-2">
    {% for test in tests %}
    <article class="card">
        <h3>{{ test.title }}</h3>
        <p style="color: var(--text-muted);">{{ test.description|truncatewords:20 }}</p>
        <div class="flex" style="justify-content: space-between; align-items: center; margin-top: 1.5rem;">
            <small style="color: var(--text-muted);">By {{ test.author.username }}</small>
            <a href="{% url 'take_test' pk=test.pk %}" class="btn btn-primary"
                style="padding: 0.25rem 0.75rem; font-size: 0.875rem;">Take Test</a>
        </div>
    </article>
    {% empty %}
    <p>No tests available.</p>
    {% endfor %}
</div>
{% endblock %}
