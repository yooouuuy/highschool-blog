{% extends 'base.html' %}

{% block content %}
<div class="container-narrow">
    <div class="card">
        <h1 class="mb-4">Upload New Resource</h1>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group mb-4">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <small class="text-muted d-block mt-1">{{ field.help_text }}</small>
                {% endif %}
                {% if field.errors %}
                <div class="alert alert-error mt-2">
                    {{ field.errors.0 }}
                </div>
                {% endif %}
            </div>
            {% endfor %}

            <div class="flex" style="gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary">
                    {% if user.is_teacher or user.is_staff %}Publish Resource{% else %}Submit for Approval{% endif %}
                </button>
                <a href="{% url 'resource_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
