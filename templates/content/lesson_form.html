{% extends 'base.html' %}

{% block content %}
<h1>Create Lesson</h1>
<form method="post" class="card" style="padding: 2rem; max-width: 800px; margin: 0 auto;">
    {% csrf_token %}
    <div style="margin-bottom: 1.5rem;">
        <label for="id_title" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Title</label>
        {{ form.title }}
    </div>
    <div style="margin-bottom: 1.5rem;">
        <label for="id_content" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Content</label>
        {{ form.content }}
    </div>

    <div class="grid grid-cols-3" style="gap: 1.5rem; margin-bottom: 1.5rem;">
        <div>
            <label for="id_year" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Year</label>
            {{ form.year }}
        </div>
        <div>
            <label for="id_stream" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Stream</label>
            {{ form.stream }}
        </div>
        <div>
            <label for="id_subject" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Subject</label>
            {{ form.subject }}
        </div>
    </div>

    <div style="text-align: right;">
        <button type="submit" class="btn btn-primary">Save Lesson</button>
        <a href="{% url 'lesson_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

{{ subject_choices|json_script:"subject-choices-data" }}

<script>
    const streamToSubjects = {
        'common_science': ['math', 'science', 'physics', 'arabic', 'english', 'french', 'hist_geo'],
        'common_literature': ['math', 'science', 'physics', 'arabic', 'english', 'french', 'hist_geo'],
        'math': ['math', 'science', 'physics', 'arabic', 'english', 'french', 'hist_geo'],
        'science': ['math', 'science', 'physics', 'arabic', 'english', 'french', 'hist_geo'],
        'languages': ['math', 'science', 'physics', 'arabic', 'english', 'french', 'hist_geo', 'german', 'spanish'],
        'literature': ['math', 'science', 'physics', 'arabic', 'english', 'french', 'hist_geo'],
        'management_economics': ['math', 'physics', 'arabic', 'english', 'french', 'hist_geo', 'accounting', 'law', 'economy'],
        'civil_engineering': ['math', 'physics', 'arabic', 'english', 'french', 'hist_geo', 'civil_eng']
    };

    const subjectChoices = JSON.parse(document.getElementById('subject-choices-data').textContent).reduce((acc, [val, label]) => {
        acc[val] = label;
        return acc;
    }, {});

    const streamSelect = document.getElementById('id_stream');
    const subjectSelect = document.getElementById('id_subject');

    function updateSubjects() {
        const stream = streamSelect.value;
        const currentSubject = subjectSelect.value;

        const validSubjects = stream ? streamToSubjects[stream] : Object.keys(subjectChoices);

        subjectSelect.innerHTML = '<option value="">---------</option>';

        validSubjects.forEach(sub => {
            const option = document.createElement('option');
            option.value = sub;
            option.textContent = subjectChoices[sub];
            if (sub === currentSubject) option.selected = true;
            subjectSelect.appendChild(option);
        });
    }

    streamSelect.addEventListener('change', updateSubjects);
    updateSubjects();
</script>

<style>
    .form-input,
    select,
    textarea,
    input[type="text"] {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        background-color: var(--card-bg);
        color: var(--text-color);
    }

    textarea {
        min-height: 200px;
    }
</style>
{% endblock %}
