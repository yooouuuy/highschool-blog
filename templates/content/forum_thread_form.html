{% extends 'base.html' %}

{% block content %}
<div class="container-narrow">
    <div class="card">
        <h1 class="mb-4">Start New Discussion</h1>

        <form method="post">
            {% csrf_token %}
            <div class="form-group mb-4">
                <label class="form-label">Discussion Title</label>
                {{ form.title }}
            </div>

            <div class="grid grid-cols-2" style="gap: 1.5rem; margin-bottom: 1.5rem;">
                <div>
                    <label class="form-label">Year</label>
                    {{ form.year }}
                </div>
                <div>
                    <label class="form-label">Stream</label>
                    {{ form.stream }}
                </div>
            </div>

            <div class="form-group mb-4">
                <label class="form-label">Your Message</label>
                <textarea name="content" class="form-input" rows="6" placeholder="What's on your mind?"
                    required></textarea>
            </div>

            <div class="flex" style="gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary">Post Discussion</button>
                <a href="{% url 'forum_thread_list' subject=subject %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
