{% extends 'base.html' %}

{% block content %}
<div class="container-narrow fade-in">
    <div class="chat-container full-page-chat">
        <div class="chat-header">
            <div class="flex-between-center">
                <div>
                    <h2>{{ year_display }}</h2>
                    <p class="subtitle">{{ stream_display }}</p>
                </div>
                <div class="chat-badge-area">
                    <span class="badge badge-white">Chat Room</span>
                </div>
            </div>
        </div>

        <div id="chat-messages" class="chat-messages">
            <!-- Messages will be loaded here via AJAX -->
            <div class="text-center loading-state">
                <p class="text-muted">Loading messages...</p>
            </div>
        </div>

        <div class="chat-input-area">
            <form id="chat-form" class="flex" style="gap: 0.75rem;">
                {% csrf_token %}
                <input type="text" id="message-input" name="message" placeholder="Type your message..."
                    class="form-input rounded-pill" required autocomplete="off">
                <button type="submit" class="btn btn-primary btn-round large">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    let lastMessageId = null;

    // Get CSRF token from form
    function getCsrfToken() {
        return document.querySelector('[name=csrfmiddlewaretoken]').value;
    }

    function createMessageElement(msg) {
        const div = document.createElement('div');
        div.className = `message-bubble ${msg.is_mine ? 'mine' : 'others'}`;
        div.setAttribute('data-id', msg.id);

        div.innerHTML = `
            <div class="message-info">
                <strong>${msg.author}</strong>
                <span>${msg.time}</span>
            </div>
            <div class="message-text">${msg.text}</div>
        `;
        return div;
    }

    async function fetchMessages() {
        try {
            const url = `{% url 'get_messages' year=year stream=stream %}?last_id=${lastMessageId || ''}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.success && data.messages.length > 0) {
                if (lastMessageId === null) {
                    chatMessages.innerHTML = '';
                }

                data.messages.forEach(msg => {
                    chatMessages.appendChild(createMessageElement(msg));
                    lastMessageId = msg.id;
                });

                scrollToBottom();
            } else if (lastMessageId === null && data.messages.length === 0) {
                chatMessages.innerHTML = '<p class="text-center" style="color: var(--text-muted); margin-top: 2rem;">No messages yet. Be the first to say something!</p>';
            }
        } catch (error) {
            console.error('Error fetching messages:', error);
        }
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Handle form submission
    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const message = messageInput.value.trim();
        if (!message) return;

        const formData = new FormData();
        formData.append('message', message);
        formData.append('csrfmiddlewaretoken', getCsrfToken());

        messageInput.value = '';

        try {
            const response = await fetch('{% url "send_message" year=year stream=stream %}', {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'X-CSRFToken': getCsrfToken(),
                },
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                // Message will be picked up by the next poll, but we can add it immediately for responsiveness
                if (!document.querySelector(`[data-id="${data.message.id}"]`)) {
                    chatMessages.appendChild(createMessageElement(data.message));
                    lastMessageId = data.message.id;
                    scrollToBottom();
                }
            } else {
                alert('Failed to send message: ' + (data.error || 'Unknown error'));
            }
        } catch (error) {
            console.error('Error sending message:', error);
            alert('Error sending message. Please try again.');
        }
    });

    // Initial fetch
    fetchMessages();

    // Poll for new messages every 3 seconds
    setInterval(fetchMessages, 3000);
</script>
{% endblock %}
