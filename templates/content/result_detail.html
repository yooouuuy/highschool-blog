{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 4rem auto;">
    <div class="card text-center">
        <h1 class="mb-4">Test Results</h1>
        <h2 style="color: var(--primary); margin-bottom: 2rem;">{{ result.test.title }}</h2>

        <div
            style="margin-bottom: 2rem; padding: 2rem; background-color: var(--background); border-radius: var(--radius);">
            <p style="font-size: 1.1rem; margin-bottom: 0.5rem;" class="text-muted">Score</p>
            <div style="font-size: 4rem; font-weight: 800; color: var(--text); line-height: 1;">
                {{ result.score }}<span style="font-size: 2rem; color: var(--text-muted);">/{{ result.total_questions
                    }}</span>
            </div>
        </div>

        <div class="grid grid-cols-2 mb-4" style="text-align: left;">
            <div>
                <small style="color: var(--text-muted);">Student</small>
                <p>{{ result.student.username }}</p>
            </div>
            <div>
                <small style="color: var(--text-muted);">Date Taken</small>
                <p>{{ result.date_taken|date:"F j, Y" }}</p>
            </div>
        </div>

        <div class="mt-4">
            <a href="{% url 'test_list' %}" class="btn btn-primary">Take Another Test</a>
            <a href="{% url 'student_dashboard' %}" class="btn btn-secondary" style="margin-left: 0.5rem;">Go to
                Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
